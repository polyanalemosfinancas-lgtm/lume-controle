<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1b35">
<title>Lume Finanças — BPO</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0d1b35;--navy2:#162040;
  --gold:#c9963a;--gold2:#e8b84b;--gold3:#f5d080;--gold4:#fae9b8;
  --white:#ffffff;--offwhite:#f7f4ee;--muted:#8a99b8;
  --green:#2e7d52;--greenl:#d4f0e2;--red:#a82525;--redl:#fde0e0;
  --nav-h:64px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow-x:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--navy)}

/* LOCK */
#lockScreen{position:fixed;inset:0;background:var(--navy);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 22px;overflow-y:auto}
#lockScreen.gone{display:none}
.lock-logo{width:84px;height:84px;border-radius:50%;overflow:hidden;margin-bottom:14px;box-shadow:0 0 0 12px rgba(201,150,58,.1)}
.lock-logo img{width:100%;height:100%;object-fit:cover}
.lock-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--white);font-weight:500;margin-bottom:3px;text-align:center}
.lock-sub{font-size:12px;color:var(--muted);margin-bottom:24px;text-align:center}
.lock-card{background:rgba(255,255,255,.05);border:1px solid rgba(201,150,58,.2);border-radius:18px;padding:22px 20px;width:100%;max-width:340px}
.ll{font-size:10px;color:var(--muted);font-weight:500;display:block;letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px;margin-top:12px}
.ll:first-child{margin-top:0}
.liw{position:relative}
.li{width:100%;padding:13px 44px 13px 14px;border-radius:11px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);font-size:16px;font-family:'DM Sans',sans-serif;color:var(--white);outline:none;-webkit-appearance:none;transition:border-color .2s}
.li:focus{border-color:rgba(201,150,58,.7)}
.li::placeholder{color:rgba(255,255,255,.22);font-size:13px}
.leye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;padding:4px;line-height:1}
.lerr{font-size:12px;color:#f09090;margin-top:8px;min-height:16px;text-align:center}
.lbtn{width:100%;padding:14px;border-radius:11px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;font-size:15px;font-weight:600;color:var(--navy);cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:14px}
.lbtn:active{opacity:.82}
.lhint{font-size:11px;color:rgba(255,255,255,.2);text-align:center;margin-top:14px;line-height:1.6}
.lfirst{font-size:12px;color:var(--gold3);text-align:center;margin-top:10px;font-style:italic}
#resetBtn{display:none;margin-top:14px;background:none;border:none;color:rgba(255,255,255,.2);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline;padding:4px}

/* APP */
#appRoot{display:none;background:var(--offwhite);min-height:100vh;padding-bottom:calc(var(--nav-h) + var(--safe-bottom))}
.header{background:var(--navy);padding:11px 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.28)}
.header-inner{display:flex;align-items:center;gap:10px;max-width:760px;margin:0 auto}
.logo-img{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;border:1.5px solid rgba(201,150,58,.4)}
.logo-img img{width:100%;height:100%;object-fit:cover}
.htext{flex:1;min-width:0}
.htext h1{font-family:'Playfair Display',serif;font-size:16px;color:var(--white);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.htext p{font-size:10px;color:var(--muted);margin-top:1px}
.hdate-pill{font-size:11px;color:var(--gold3);background:rgba(201,150,58,.15);padding:5px 10px;border-radius:14px;border:1px solid rgba(201,150,58,.3);white-space:nowrap;flex-shrink:0}
.hlock-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(201,150,58,.3);background:rgba(201,150,58,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--navy);display:flex;z-index:100;border-top:1px solid rgba(201,150,58,.2);padding-bottom:var(--safe-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;cursor:pointer;gap:4px;border:none;background:none;-webkit-appearance:none}
.nav-icon{font-size:20px;line-height:1}
.nav-lbl{font-size:10px;font-weight:500;color:var(--muted);font-family:'DM Sans',sans-serif}
.nav-item.active .nav-lbl{color:var(--gold2)}
.nav-bar{position:absolute;top:0;height:2px;background:var(--gold2);border-radius:0 0 2px 2px;transition:all .3s cubic-bezier(.4,0,.2,1);width:33.33%;left:0}

/* PANELS */
.panel{display:none;padding:14px 14px 0;max-width:760px;margin:0 auto}
.panel.active{display:block}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--white);border-radius:10px;padding:12px 14px;border:.5px solid #ddd}
.stat-val{font-family:'Playfair Display',serif;font-size:22px;color:var(--navy);font-weight:600}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:1px}
.stat-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px}

/* SEARCH */
.search-row{display:flex;gap:8px;margin-bottom:12px}
.search-row input{flex:1;padding:11px 14px;border-radius:10px;border:1px solid #ddd;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--white);outline:none;-webkit-appearance:none}
.search-row input:focus{border-color:var(--gold)}
.add-btn{background:var(--navy);color:var(--gold2);border:none;padding:11px 14px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0}

/* CLIENT CARDS */
.client-card{background:var(--white);border-radius:12px;margin-bottom:10px;border:.5px solid #ddd;overflow:hidden}
.client-hdr{background:var(--navy);padding:12px 14px;display:flex;align-items:center;gap:10px;min-height:54px}
.c-init{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--navy);flex-shrink:0;cursor:pointer}
.c-info{flex:1;min-width:0;cursor:pointer}
.c-name{font-family:'Playfair Display',serif;font-size:14px;color:var(--white);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-cnpj{font-size:10px;color:var(--muted)}
.pbar-wrap{display:flex;align-items:center;gap:5px;flex-shrink:0;cursor:pointer}
.pbar{width:44px;height:4px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;background:var(--gold2)}
.ppct{font-size:10px;color:var(--gold3)}
.chev{color:var(--muted);font-size:10px;transition:transform .25s;display:inline-block;flex-shrink:0;cursor:pointer;margin-left:2px}
.chev.open{transform:rotate(180deg)}
.del-c-btn{width:28px;height:28px;border-radius:7px;border:1px solid rgba(255,100,100,.2);background:rgba(255,80,80,.08);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:#ff9090;margin-left:4px}

/* TASKS */
.tasks-list{display:flex;flex-direction:column;background:var(--offwhite)}
.task-item{background:var(--white);padding:11px 14px;display:flex;align-items:center;gap:11px;border-bottom:.5px solid #f0ece4;min-height:46px}
.task-item:last-child{border-bottom:none}
.task-item.done{opacity:.6}
.task-cb{width:22px;height:22px;border-radius:6px;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:12px;cursor:pointer}
.task-cb.checked{background:var(--gold);border-color:var(--gold);color:var(--navy)}
.task-lbl{font-size:13px;color:var(--navy);flex:1;line-height:1.35;cursor:pointer}
.task-item.done .task-lbl{text-decoration:line-through;color:var(--muted)}
.task-cat{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;white-space:nowrap;flex-shrink:0}
.cat-cp{background:#dff0e8;color:#1f6640}
.cat-conc{background:#e8eeff;color:#2a3f99}
.cat-rel{background:#fff2e0;color:#8a4a00}
.cat-imp{background:#ffe8e8;color:#8a1a1a}
.del-t-btn{width:24px;height:24px;border:none;background:none;cursor:pointer;color:#ddd;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.del-t-btn:active{color:var(--red)}
.add-task-row{padding:9px 14px;background:var(--offwhite);border-top:.5px solid #e8e3d9;display:flex;gap:8px}
.add-task-inp{flex:1;padding:9px 11px;border-radius:8px;border:1px solid #ddd;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--white);outline:none;-webkit-appearance:none}
.add-task-inp:focus{border-color:var(--gold)}
.add-task-btn{background:var(--gold);color:var(--navy);border:none;border-radius:8px;padding:9px 13px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0}

/* VENCIMENTOS */
.ven-filters{display:flex;gap:6px;margin-bottom:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.ven-filters::-webkit-scrollbar{display:none}
.ven-filter{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid #ddd;background:var(--white);cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--navy);white-space:nowrap;flex-shrink:0;-webkit-appearance:none}
.ven-filter.active{background:var(--navy);color:var(--gold2);border-color:var(--gold)}
.cli-filters{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.cli-filters::-webkit-scrollbar{display:none}
.cli-chip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid #ddd;background:var(--white);cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted);white-space:nowrap;flex-shrink:0;-webkit-appearance:none;transition:all .15s}
.cli-chip.active{background:var(--gold4);color:var(--navy);border-color:var(--gold)}
.period-bar{background:var(--white);border-radius:10px;padding:11px 13px;margin-bottom:12px;border:.5px solid #ddd;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.period-bar label{font-size:10px;color:var(--muted);font-weight:500;white-space:nowrap}
.period-bar input[type=date]{padding:6px 9px;border-radius:7px;border:1px solid #ddd;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--offwhite);color:var(--navy);outline:none;-webkit-appearance:none;flex:1;min-width:110px}
.period-bar input[type=date]:focus{border-color:var(--gold)}
.period-clear{padding:6px 12px;border-radius:7px;border:1px solid #ddd;background:none;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted);white-space:nowrap}
.ven-summary{background:var(--navy);border-radius:10px;padding:11px 14px;margin-bottom:12px;display:none}
.ven-summary.show{display:flex;align-items:center;justify-content:space-between;gap:10px}
.ven-summary-label{font-size:11px;color:var(--muted)}
.ven-summary-val{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold2);font-weight:600}
.ven-summary-count{font-size:10px;color:var(--muted);margin-top:1px}
.ven-list{display:flex;flex-direction:column;gap:8px}
.ven-card{background:var(--white);border-radius:12px;padding:12px 13px;display:flex;align-items:center;gap:11px;border-left:4px solid #ddd}
.ven-card.ok{border-left-color:var(--green)}
.ven-card.warn{border-left-color:#e8a020}
.ven-card.crit{border-left-color:var(--red)}
.ven-dia{width:42px;height:42px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.ven-dia.ok{background:var(--greenl);color:var(--green)}
.ven-dia.warn{background:#fef3dc;color:#8a5500}
.ven-dia.crit{background:var(--redl);color:var(--red)}
.ven-dia-num{font-size:15px;line-height:1;font-family:'Playfair Display',serif;font-weight:600}
.ven-dia-mes{font-size:9px;opacity:.75}
.ven-info{flex:1;min-width:0}
.ven-desc{font-size:13px;color:var(--navy);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ven-cli{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ven-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.ven-val{font-family:'Playfair Display',serif;font-size:13px;color:var(--navy)}
.ven-tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;white-space:nowrap}
.ven-tag.ok{background:var(--greenl);color:var(--green)}
.ven-tag.warn{background:#fef3dc;color:#8a5500}
.ven-tag.crit{background:var(--redl);color:var(--red)}
.ven-acts{display:flex;gap:5px;flex-shrink:0;align-items:center}
.ven-done{width:32px;height:32px;border-radius:50%;border:2px solid #ccc;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:14px;transition:all .2s}
.ven-done.paid{background:var(--greenl);border-color:var(--green);color:var(--green)}
.ven-del{width:28px;height:28px;border-radius:50%;border:none;background:none;cursor:pointer;color:#ccc;font-size:14px;display:flex;align-items:center;justify-content:center}
.ven-del:active{color:var(--red)}

/* FORMS */
.add-form{background:var(--white);border-radius:12px;padding:15px;margin:10px 0;border:1px dashed var(--gold);display:none}
.add-form.show{display:block}
.ff{margin-bottom:9px}
.ff label{display:block;font-size:11px;color:var(--muted);font-weight:500;margin-bottom:4px}
.ff input,.ff select{width:100%;padding:10px 11px;border-radius:8px;border:1px solid #ddd;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--offwhite);outline:none;-webkit-appearance:none;color:var(--navy)}
.ff input:focus,.ff select:focus{border-color:var(--gold)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}
.btn-c{background:none;border:1px solid #ddd;border-radius:8px;padding:9px 16px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--navy)}
.btn-s{background:var(--navy);color:var(--gold2);border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.sdiv{font-size:11px;color:var(--muted);padding:8px 0 5px;display:flex;align-items:center;gap:8px}
.sdiv::after{content:'';flex:1;height:1px;background:#e8e3d9}

/* CADASTRO */
.cad-card{background:var(--white);border-radius:12px;margin-bottom:10px;border:.5px solid #ddd;overflow:hidden}
.cad-hdr{background:var(--navy);padding:13px 14px;display:flex;align-items:center;gap:11px;min-height:56px}
.cad-init{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--navy);flex-shrink:0;cursor:pointer}
.cad-ti{flex:1;min-width:0;cursor:pointer}
.cad-razao{font-family:'Playfair Display',serif;font-size:14px;color:var(--white);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cad-sub{font-size:10px;color:var(--muted);margin-top:1px}
.cad-body{padding:13px 15px;display:flex;flex-direction:column;gap:9px}
.sec-t{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;padding-bottom:5px;border-bottom:1px solid #eee;margin-bottom:2px}
.cad-f{display:flex;flex-direction:column;gap:3px}
.cad-f label{font-size:11px;color:var(--muted);font-weight:500}
.cad-f input{padding:9px 11px;border-radius:8px;border:1px solid #e0dbd0;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--offwhite);color:var(--navy);outline:none;-webkit-appearance:none;width:100%}
.cad-f input:focus{border-color:var(--gold);background:var(--white)}
.col2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.pass-sec{padding:0 15px 13px}
.pass-sec-t{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;padding:9px 0 7px;border-top:1px solid #eee;margin-bottom:7px}
.pass-grp{background:var(--offwhite);border-radius:10px;padding:11px 13px;border:.5px solid #e0dbd0;margin-bottom:7px}
.pass-grp-h{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.p-icon{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.p-icon.banco{background:#dde8fb;color:#1a4a8a}
.p-icon.erp{background:#fff2e0;color:#8a4a00}
.p-icon.email{background:#dff0e8;color:#1f6640}
.p-icon.govbr{background:#ffe8e8;color:#8a1a1a}
.p-icon.extra{background:#f0e8ff;color:#4a1a8a}
.p-name{border:none;background:none;font-size:13px;font-weight:500;color:var(--navy);font-family:'DM Sans',sans-serif;outline:none;flex:1;min-width:0}
.p-del{width:24px;height:24px;border:none;background:none;cursor:pointer;color:#ccc;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.p-del:active{color:var(--red)}
.p-row{display:flex;flex-direction:column;gap:3px;margin-bottom:7px}
.p-row:last-child{margin-bottom:0}
.p-lbl{font-size:10px;color:var(--muted);font-weight:500}
.p-wrap{position:relative}
.p-val{width:100%;padding:8px 68px 8px 11px;border-radius:7px;border:1px solid #e0dbd0;font-size:13px;font-family:monospace;background:var(--white);color:var(--navy);outline:none;-webkit-appearance:none}
.p-val:focus{border-color:var(--gold)}
.p-acts{position:absolute;right:3px;top:50%;transform:translateY(-50%);display:flex;gap:2px}
.p-eye,.p-copy{width:28px;height:24px;border:none;border-radius:4px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:500}
.p-eye{background:#ede9e0;color:var(--muted)}
.p-copy{background:var(--navy);color:var(--gold2)}
.p-copy.copied{background:var(--green);color:white}
.add-p-btn{display:flex;align-items:center;justify-content:center;width:100%;padding:9px;border-radius:9px;border:1.5px dashed #d0c9bc;background:none;cursor:pointer;font-size:13px;color:var(--muted);font-family:'DM Sans',sans-serif;margin-top:3px}

/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;justify-content:center}
.modal-ov.show{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:18px 16px;width:100%;max-height:90vh;overflow-y:auto;padding-bottom:calc(18px + var(--safe-bottom))}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 14px}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--navy);margin-bottom:14px;font-weight:500}
.m-sec{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:12px 0 7px;padding-top:9px;border-top:1px solid #eee}
.m-sec:first-of-type{margin-top:0;padding-top:0;border-top:none}
.m-f{display:flex;flex-direction:column;gap:3px;margin-bottom:9px}
.m-f label{font-size:11px;color:var(--muted);font-weight:500}
.m-f input,.m-f select{padding:10px 11px;border-radius:8px;border:1px solid #ddd;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:var(--offwhite);color:var(--navy);width:100%;-webkit-appearance:none}
.m-f input:focus,.m-f select:focus{border-color:var(--gold);background:var(--white)}
.m-pblk{background:var(--offwhite);border-radius:10px;padding:11px;margin-bottom:7px;border:.5px solid #e0dbd0}
.m-pblk-t{font-size:11px;font-weight:500;color:var(--navy);margin-bottom:7px}
.m-btns{display:flex;gap:8px;margin-top:14px}
.m-btns .btn-c{flex:1}.m-btns .btn-s{flex:2}

/* FAB & TOAST */
.fab{position:fixed;right:16px;bottom:calc(var(--nav-h) + var(--safe-bottom) + 14px);width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--navy);font-weight:700;box-shadow:0 4px 16px rgba(201,150,58,.4);z-index:90}
.fab:active{transform:scale(.92)}
#toast{position:fixed;bottom:calc(72px + var(--safe-bottom) + 10px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--navy);color:var(--gold2);font-size:12px;font-weight:500;padding:7px 16px;border-radius:20px;border:1px solid rgba(201,150,58,.3);z-index:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}

@media(min-width:600px){
  .stats{grid-template-columns:repeat(4,1fr)}
  .tasks-list{display:grid;grid-template-columns:1fr 1fr}
  .col2{grid-template-columns:1fr 1fr 1fr}
  .pass-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-ov{align-items:center}
  .modal{border-radius:16px;max-width:540px;padding-bottom:18px}
  .modal-handle{display:none}
  .wrap-inner{max-width:760px;margin:0 auto}
}
</style>

// ── 2. HELPER FUNCTIONS ───────────────────────────────────────────────────
function H(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ini(n){return n.split(' ').slice(0,2).map(function(w){return w[0];}).join('').toUpperCase();}

function hashPwd(pwd,salt){
  var s=pwd+'|'+salt,h=5381;
  for(var i=0;i<s.length;i++){h=((h<<5)+h)+s.charCodeAt(i);h=h&0xffffffff;}
  return (h>>>0).toString(36);
}
function xorEncode(str,key){
  var out='';
  for(var i=0;i<str.length;i++) out+=String.fromCharCode(str.charCodeAt(i)^key.charCodeAt(i%key.length));
  return btoa(unescape(encodeURIComponent(out)));
}
function xorDecode(b64,key){
  var str=decodeURIComponent(escape(atob(b64))),out='';
  for(var i=0;i<str.length;i++) out+=String.fromCharCode(str.charCodeAt(i)^key.charCodeAt(i%key.length));
  return out;
}

}

// ── 4. AUTH FUNCTIONS ─────────────────────────────────────────────────────
function doLogin(){
  var now=Date.now();
  if(now<lockUntil){document.getElementById('lErr').textContent='Aguarde '+Math.ceil((lockUntil-now)/1000)+'s.';return;}
  var pwd=document.getElementById('lInput').value;
  if(!pwd){document.getElementById('lErr').textContent='Digite sua senha.';return;}
  if(isFirstTime){
    var conf=document.getElementById('lConfirm').value;
    if(!conf){document.getElementById('lErr').textContent='Confirme sua senha.';return;}
    if(pwd!==conf){document.getElementById('lErr').textContent='As senhas não coincidem.';return;}
    if(pwd.length<4){document.getElementById('lErr').textContent='Mínimo 4 caracteres.';return;}
    var salt=Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2);
    sessionPwd=pwd;
    var btn=document.getElementById('lBtn');btn.disabled=true;btn.textContent='Criando...';
    db.collection('lume_bpo').doc('salt').set({salt:salt,hash:hashPwd(pwd,salt)}).then(function(){
      var enc=xorEncode(JSON.stringify({clients:clients,vencimentos:vencimentos,cadastros:cadastros}),sessionPwd);
      return db.collection('lume_bpo').doc('data').set({d:enc,ts:Date.now()});
    }).then(function(){enterApp();}).catch(function(e){
      document.getElementById('lErr').textContent='Erro ao salvar. Verifique a conexão.';
      btn.disabled=false;btn.textContent='Criar senha e entrar';
    });
    return;
  }
  var btn=document.getElementById('lBtn');btn.disabled=true;btn.textContent='Verificando...';
  db.collection('lume_bpo').doc('salt').get().then(function(snap){
    if(!snap.exists){throw new Error('wrong');}
    var d=snap.data();
    if(hashPwd(pwd,d.salt)!==d.hash){throw new Error('wrong');}
    sessionPwd=pwd;
    return db.collection('lume_bpo').doc('data').get();
  }).then(function(snap){
    if(snap.exists&&snap.data().d){
      try{
        var raw=JSON.parse(xorDecode(snap.data().d,sessionPwd));
        if(raw.clients) clients=raw.clients;
        if(raw.vencimentos) vencimentos=raw.vencimentos;
        if(raw.cadastros){raw.cadastros.forEach(function(c){(c.acessos||[]).forEach(function(a){if(a.vis===undefined)a.vis=false;});});cadastros=raw.cadastros;}
      }catch(e){console.warn('decode',e);}
    }
    fails=0;
    db.collection('lume_bpo').doc('data').onSnapshot(function(snap){
      if(!snap.exists||!sessionPwd) return;
      try{
        var raw=JSON.parse(xorDecode(snap.data().d,sessionPwd));
        if(raw.clients) clients=raw.clients;
        if(raw.vencimentos) vencimentos=raw.vencimentos;
        if(raw.cadastros){raw.cadastros.forEach(function(c){(c.acessos||[]).forEach(function(a){if(a.vis===undefined)a.vis=false;});});cadastros=raw.cadastros;}
        if(document.getElementById('appRoot').style.display!=='none'){
          renderStats();renderClients();renderCliChips();renderVen();renderCadastro();
        }
      }catch(e){console.warn('sync',e);}
    });
    enterApp();
  }).catch(function(e){
    fails++;
    if(fails>=5){lockUntil=Date.now()+30000;document.getElementById('lErr').textContent='Muitas tentativas. Aguarde 30s.';}
    else if(e.message==='wrong'){document.getElementById('lErr').textContent='Senha incorreta. ('+fails+'/5)';}
    else{document.getElementById('lErr').textContent='Erro de conexão.';}
    btn.disabled=false;btn.textContent=isFirstTime?'Criar senha e entrar':'Entrar';
  });
}

  var cr=vencimentos.filter(function(v){return vs(v)==='crit'&&!v.paid;}).length;

      return '<div class="task-item'+(t.done?' done':'')+'">'+
        '<div class="task-cb'+(t.done?' checked':'')+'" onclick="togT('+c.id+','+t.id+')">'+(t.done?'✓':'')+'</div>'+

    }).join('');
    return '<div class="client-card">'+
      '<div class="client-hdr">'+
      '<div class="c-init" onclick="togC('+c.id+')">'+ini(c.name)+'</div>'+
      '<div class="c-info" onclick="togC('+c.id+')"><div class="c-name">'+H(c.name)+'</div><div class="c-cnpj">'+c.cnpj+'</div></div>'+
      '<div class="pbar-wrap" onclick="togC('+c.id+')"><div class="pbar"><div class="pbar-fill" style="width:'+pct+'%"></div></div><span class="ppct">'+don+'/'+tot+'</span></div>'+
      '<span class="chev'+(op?' open':'')+'" onclick="togC('+c.id+')">▼</span>'+
      '<button class="del-c-btn" onclick="delClient('+c.id+')">🗑</button></div>'+
      (op?'<div class="tasks-list">'+(tasks||'<div style="padding:12px 14px;font-size:13px;color:var(--muted)">Nenhuma tarefa.</div>')+'</div>'+
      '<div class="add-task-row"><input class="add-task-inp" id="nt-'+c.id+'" placeholder="+ Tarefa rápida..." onkeydown="if(event.key===\'Enter\')addT('+c.id+')"><button class="add-task-btn" onclick="addT('+c.id+')">+</button></div>':'')+
      '</div>';
  }).join('');
}
function togC(id){openC[id]=!openC[id];renderClients();}
function togT(cid,tid){var c=clients.find(function(x){return x.id===cid;});var t=c.tasks.find(function(x){return x.id===tid;});t.done=!t.done;renderClients();renderStats();autoSave();}
function delT(cid,tid){if(!confirm('Excluir esta tarefa?'))return;var c=clients.find(function(x){return x.id===cid;});c.tasks=c.tasks.filter(function(t){return t.id!==tid;});renderClients();renderStats();autoSave();}
function addT(cid){var inp=document.getElementById('nt-'+cid),v=inp.value.trim();if(!v)return;clients.find(function(x){return x.id===cid;}).tasks.push({id:Date.now(),label:v,cat:0,done:false});renderClients();renderStats();autoSave();}
function addClient(){
  var n=prompt('Nome do cliente:');if(!n||!n.trim())return;
  var cnpj=prompt('CNPJ:','00.000.000/0001-00')||'—';
  var id=Date.now();
  // Add to rotinas
  clients.push({id:id,name:n.trim(),cnpj:cnpj,tasks:[]});
  // Add to cadastro automatically
  cadastros.push({id:id,razao:n.trim(),cnpj:cnpj,contador:'',regime:'',contato:'',tel:'',email:'',obs:'',
    acessos:[
      {id:'banco',type:'banco',label:'Banco',user:'',pass:'',vis:false},
      {id:'erp',type:'erp',label:'ERP/Sistema',user:'',pass:'',vis:false},
      {id:'mail',type:'mail',label:'E-mail',user:'',pass:'',vis:false},
      {id:'govbr',type:'govbr',label:'Gov.br/e-CAC',user:'',pass:'',vis:false}]});
  openC[id]=true;openCad[id]=true;
  renderClients();renderCliChips();renderCadastro();renderStats();autoSave();
  setTimeout(function(){var cc=document.querySelectorAll('.client-card');if(cc.length)cc[cc.length-1].scrollIntoView({behavior:'smooth',block:'start'});},100);
}

function delClient(id){
  if(!confirm('Excluir este cliente de todas as abas (rotinas, vencimentos e cadastro)?'))return;
  clients=clients.filter(function(c){return c.id!==id;});
  cadastros=cadastros.filter(function(c){return c.id!==id;});
  delete openC[id];delete openCad[id];
  renderClients();renderCliChips();renderCadastro();renderStats();autoSave();
}

// ── VENCIMENTOS ───────────────────────────────────────────────────────────
function du(d){var x=d-todayDay;if(x<0)x+=31;return x;}
function vs(v){if(v.paid)return'ok';var d=du(v.dia);if(d<=0)return'crit';if(d<=5)return'warn';return'ok';}
function vl(v){if(v.paid)return'Pago';var d=du(v.dia);if(d===0)return'Vence hoje';if(d<0)return'Vencido';return d+' dia'+(d>1?'s':'');}
var venClientFilter = 'todos';

function renderCliChips() {
  var chips = '<button class="cli-chip'+(venClientFilter==='todos'?' active':'')+'" onclick="fCli(\'todos\',this)">Todos clientes</button>';
  clients.forEach(function(c) {
    chips += '<button class="cli-chip'+(venClientFilter===c.name?' active':'')+'" onclick="fCli(\''+c.name.replace(/'/g,"\\'")+ '\',this)">'+H(c.name)+'</button>';
  });
  var el = document.getElementById('cliChips');
  if (el) el.innerHTML = chips;
}

function fCli(name, el) {
  venClientFilter = name;
  document.querySelectorAll('.cli-chip').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  renderVen();
}

function clearPeriod() {
  document.getElementById('periodFrom').value = '';
  document.getElementById('periodTo').value = '';
  renderVen();
}

function parseValor(val) {
  if (!val) return 0;
  return parseFloat(val.replace(/[^0-9,\.]/g,'').replace(',','.')) || 0;
}

function venInPeriod(v) {
  var from = document.getElementById('periodFrom') ? document.getElementById('periodFrom').value : '';
  var to   = document.getElementById('periodTo')   ? document.getElementById('periodTo').value   : '';
  if (!from && !to) return true;
  var now = new Date();
  var year = now.getFullYear(), month = now.getMonth();
  // Build date for this vencimento in current month
  var vDate = new Date(year, month, v.dia);
  var ok = true;
  if (from) ok = ok && vDate >= new Date(from);
  if (to)   ok = ok && vDate <= new Date(to + 'T23:59:59');
  return ok;
}

function renderVen(){
  var mes=MESES[new Date().getMonth()];
  var sorted=vencimentos.slice().sort(function(a,b){if(!a.paid&&b.paid)return-1;if(a.paid&&!b.paid)return 1;var o={crit:0,warn:1,ok:2};return(o[vs(a)]||2)-(o[vs(b)]||2);});
  var fl = sorted.filter(function(v) {
    if (venFilter !== 'todos') { if(v.paid && venFilter !== 'ok') return false; if(vs(v) !== venFilter) return false; }
    if (venClientFilter !== 'todos' && v.client !== venClientFilter) return false;
    if (!venInPeriod(v)) return false;
    return true;
  });
  // Summary
  var unpaid = fl.filter(function(v){return !v.paid;});
  var total = unpaid.reduce(function(a,v){return a+parseValor(v.valor);},0);
  var sumEl = document.getElementById('venSummary');
  var hasFilters = venClientFilter !== 'todos' || document.getElementById('periodFrom').value || document.getElementById('periodTo').value || venFilter !== 'todos';
  if (sumEl) {
    if (hasFilters && fl.length > 0) {
      sumEl.classList.add('show');
      document.getElementById('venSummaryVal').textContent = 'R$ ' + total.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
      document.getElementById('venSummaryCount').textContent = unpaid.length + ' vencimento' + (unpaid.length !== 1 ? 's' : '') + ' pendente' + (unpaid.length !== 1 ? 's' : '');
    } else { sumEl.classList.remove('show'); }
  }
  document.getElementById('venList').innerHTML=fl.map(function(v){
    var s=vs(v);
    return '<div class="ven-card '+s+'">'+
      '<div class="ven-dia '+s+'"><span class="ven-dia-num">'+v.dia+'</span><span class="ven-dia-mes">'+mes+'</span></div>'+
      '<div class="ven-info"><div class="ven-desc">'+H(v.desc)+'</div><div class="ven-cli">'+H(v.client)+' · '+v.cat+'</div></div>'+
      '<div class="ven-right"><div class="ven-val">'+v.valor+'</div><span class="ven-tag '+s+'">'+vl(v)+'</span></div>'+
      '<div class="ven-acts">'+
      '<button class="ven-done'+(v.paid?' paid':'')+'" onclick="togP('+v.id+')">'+(v.paid?'✓':'○')+'</button>'+
      '<button class="ven-del" onclick="delVen('+v.id+')">🗑</button>'+
      '</div></div>';
  }).join('')||'<p style="color:var(--muted);padding:20px;text-align:center;font-size:13px">Nenhum encontrado.</p>';
}
function togP(id){var v=vencimentos.find(function(x){return x.id===id;});v.paid=!v.paid;renderVen();renderStats();autoSave();}
function fVen(f,el){venFilter=f;document.querySelectorAll('.ven-filter').forEach(function(b){b.classList.remove('active');});el.classList.add('active');renderVen();}
function delVen(id){if(!confirm('Excluir este vencimento?'))return;vencimentos=vencimentos.filter(function(v){return v.id!==id;});renderVen();renderStats();autoSave();}
function toggleAddVen(){var f=document.getElementById('addVenForm');f.classList.toggle('show');if(f.classList.contains('show')){document.getElementById('vClient').innerHTML=clients.map(function(c){return'<option>'+H(c.name)+'</option>';}).join('');setTimeout(function(){f.scrollIntoView({behavior:'smooth',block:'start'});},100);}}
function saveVen(){var desc=document.getElementById('vDesc').value.trim(),client=document.getElementById('vClient').value,dia=parseInt(document.getElementById('vDia').value)||1,val=document.getElementById('vVal').value.trim(),cat=document.getElementById('vCat').value;if(!desc||!val){alert('Preencha descrição e valor');return;}vencimentos.push({id:Date.now(),desc:desc,client:client,dia:dia,valor:val.indexOf('R$')===0?val:'R$ '+val,cat:cat,paid:false});['vDesc','vDia','vVal'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('addVenForm').classList.remove('show');renderVen();renderStats();autoSave();}

// ── CADASTRO ──────────────────────────────────────────────────────────────
function pcls(t){return{banco:'banco',erp:'erp',mail:'email',govbr:'govbr'}[t]||'extra';}
function pico(t){return{banco:'B',erp:'E',mail:'@',govbr:'G'}[t]||'+';}
function renderCadastro(){
  var q=document.getElementById('searchCad').value.toLowerCase();
  var fl=cadastros.filter(function(c){return c.razao.toLowerCase().indexOf(q)>=0||c.cnpj.indexOf(q)>=0;});
  document.getElementById('cadList').innerHTML=fl.map(function(c){
    var op=openCad[c.id];
    var pb=(c.acessos||[]).map(function(a){
      return '<div class="pass-grp">'+
        '<div class="pass-grp-h"><span class="p-icon '+pcls(a.type)+'">'+pico(a.type)+'</span>'+
        '<input class="p-name" value="'+H(a.label)+'" onchange="upPL('+c.id+',\''+a.id+'\',this.value)">'+
        '<button class="p-del" onclick="delA('+c.id+',\''+a.id+'\')">×</button></div>'+
        '<div class="p-row"><div class="p-lbl">Usuário</div><div class="p-wrap">'+
        '<input class="p-val" id="pu-'+c.id+'-'+a.id+'" value="'+H(a.user)+'" type="text" oninput="upA('+c.id+',\''+a.id+'\',\'user\',this.value)">'+
        '<div class="p-acts"><button class="p-copy" onclick="copyF(\'pu-'+c.id+'-'+a.id+'\',this)">⎘</button></div></div></div>'+
        '<div class="p-row"><div class="p-lbl">Senha</div><div class="p-wrap">'+
        '<input class="p-val" id="pp-'+c.id+'-'+a.id+'" value="'+H(a.pass)+'" type="'+(a.vis?'text':'password')+'" oninput="upA('+c.id+',\''+a.id+'\',\'pass\',this.value)">'+
        '<div class="p-acts"><button class="p-eye" onclick="togPV('+c.id+',\''+a.id+'\')">'+(a.vis?'○':'●')+'</button>'+
        '<button class="p-copy" onclick="copyF(\'pp-'+c.id+'-'+a.id+'\',this)">⎘</button></div></div></div></div>';
    }).join('');
    return '<div class="cad-card">'+
      '<div class="cad-hdr">'+
      '<div class="cad-init" onclick="togCad('+c.id+')">'+ini(c.razao)+'</div>'+
      '<div class="cad-ti" onclick="togCad('+c.id+')"><div class="cad-razao">'+H(c.razao)+'</div><div class="cad-sub">'+c.cnpj+(c.regime?' · '+c.regime:'')+'</div></div>'+
      '<span class="chev'+(op?' open':'')+'" onclick="togCad('+c.id+')" style="color:var(--muted);font-size:10px;cursor:pointer;flex-shrink:0">▼</span>'+
      '<button class="del-c-btn" onclick="delCad('+c.id+')" style="margin-left:6px">🗑</button></div>'+
      (op?'<div class="cad-body">'+
        '<div class="sec-t">Dados da Empresa</div>'+
        '<div class="cad-f"><label>Razão Social</label><input value="'+H(c.razao)+'" oninput="upCad('+c.id+',\'razao\',this.value)"></div>'+
        '<div class="col2"><div class="cad-f"><label>CNPJ</label><input value="'+H(c.cnpj)+'" oninput="upCad('+c.id+',\'cnpj\',this.value)"></div>'+
        '<div class="cad-f"><label>Regime</label><input value="'+H(c.regime||'')+'" oninput="upCad('+c.id+',\'regime\',this.value)"></div></div>'+
        '<div class="cad-f"><label>Contador</label><input value="'+H(c.contador||'')+'" oninput="upCad('+c.id+',\'contador\',this.value)"></div>'+
        '<div class="sec-t" style="margin-top:4px">Contato</div>'+
        '<div class="cad-f"><label>Nome</label><input value="'+H(c.contato||'')+'" oninput="upCad('+c.id+',\'contato\',this.value)"></div>'+
        '<div class="col2"><div class="cad-f"><label>Tel/WA</label><input value="'+H(c.tel||'')+'" type="tel" oninput="upCad('+c.id+',\'tel\',this.value)"></div>'+
        '<div class="cad-f"><label>E-mail</label><input value="'+H(c.email||'')+'" type="email" oninput="upCad('+c.id+',\'email\',this.value)"></div></div>'+
        '<div class="cad-f"><label>Obs</label><input value="'+H(c.obs||'')+'" oninput="upCad('+c.id+',\'obs\',this.value)"></div></div>'+
        '<div class="pass-sec"><div class="pass-sec-t">Senhas e Acessos</div>'+
        '<div class="pass-grid">'+pb+'</div>'+
        '<button class="add-p-btn" onclick="addA('+c.id+')">+ Adicionar novo acesso</button></div>':'')+
      '</div>';
  }).join('');
}
function togCad(id){openCad[id]=!openCad[id];renderCadastro();}
function upCad(id,f,v){
  var c=cadastros.find(function(x){return x.id===id;});
  c[f]=v;
  // Sync name and cnpj back to clients list
  var cl=clients.find(function(x){return x.id===id;});
  if(cl){if(f==='razao')cl.name=v;if(f==='cnpj')cl.cnpj=v;}
  autoSave();
}
function upA(cid,aid,f,v){var a=cadastros.find(function(x){return x.id===cid;}).acessos.find(function(x){return x.id===aid;});if(f==='user')a.user=v;else a.pass=v;autoSave();}
function upPL(cid,aid,v){cadastros.find(function(x){return x.id===cid;}).acessos.find(function(x){return x.id===aid;}).label=v;autoSave();}
function togPV(cid,aid){var a=cadastros.find(function(x){return x.id===cid;}).acessos.find(function(x){return x.id===aid;});a.vis=!a.vis;renderCadastro();}
function delA(cid,aid){if(!confirm('Remover este acesso?'))return;var c=cadastros.find(function(x){return x.id===cid;});c.acessos=c.acessos.filter(function(a){return a.id!==aid;});renderCadastro();autoSave();}
function addA(cid){cadastros.find(function(x){return x.id===cid;}).acessos.push({id:'ex_'+(nextPid++),type:'extra',label:'Novo Acesso',user:'',pass:'',vis:false});renderCadastro();autoSave();}
function delCad(id){
  if(!confirm('Excluir este cliente de todas as abas?'))return;
  cadastros=cadastros.filter(function(c){return c.id!==id;});
  clients=clients.filter(function(c){return c.id!==id;});
  delete openCad[id];delete openC[id];
  renderCadastro();renderClients();renderCliChips();renderStats();autoSave();
}
function copyF(iid,btn){var el=document.getElementById(iid);if(!el)return;var done=function(){btn.classList.add('copied');btn.textContent='✓';setTimeout(function(){btn.classList.remove('copied');btn.textContent='⎘';},1500);};if(navigator.clipboard){navigator.clipboard.writeText(el.value).then(done).catch(function(){el.select();document.execCommand('copy');done();});}else{el.select();document.execCommand('copy');done();}}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal(){document.getElementById('modalOv').classList.add('show');document.body.style.overflow='hidden';}
function closeModal(){document.getElementById('modalOv').classList.remove('show');document.body.style.overflow='';}
function saveCadModal(){
  var razao=document.getElementById('m-razao').value.trim();
  if(!razao){alert('Informe a Razão Social');return;}
  var id=Date.now();
  cadastros.push({id:id,razao:razao,cnpj:document.getElementById('m-cnpj').value,contador:document.getElementById('m-contador').value,regime:document.getElementById('m-regime').value,contato:document.getElementById('m-contato').value,tel:document.getElementById('m-tel').value,email:document.getElementById('m-email').value,obs:document.getElementById('m-obs').value,
    acessos:[
      {id:'banco',type:'banco',label:'Banco',user:document.getElementById('m-banco-user').value,pass:document.getElementById('m-banco-pass').value,vis:false},
      {id:'erp',type:'erp',label:'ERP/Sistema',user:document.getElementById('m-erp-user').value,pass:document.getElementById('m-erp-pass').value,vis:false},
      {id:'mail',type:'mail',label:'E-mail',user:document.getElementById('m-mail-addr').value,pass:document.getElementById('m-mail-pass').value,vis:false},
      {id:'govbr',type:'govbr',label:'Gov.br/e-CAC',user:document.getElementById('m-gov-user').value,pass:document.getElementById('m-gov-pass').value,vis:false}]});
  clients.push({id:id,name:razao,cnpj:document.getElementById('m-cnpj').value,tasks:[]});
  ['m-razao','m-cnpj','m-contador','m-contato','m-tel','m-email','m-obs','m-banco-user','m-banco-pass','m-erp-user','m-erp-pass','m-mail-addr','m-mail-pass','m-gov-user','m-gov-pass'].forEach(function(x){document.getElementById(x).value='';});
  document.getElementById('m-regime').value='';
  openCad[id]=true; openC[id]=true;
  closeModal(); renderCadastro(); renderClients(); renderCliChips(); renderStats(); autoSave();
  switchTab('rotinas',0);
}
